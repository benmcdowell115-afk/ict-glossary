<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#08080f"/>
  <!-- book spine -->
  <rect x="5" y="5" width="3" height="22" rx="1.5" fill="#60a5fa"/>
  <!-- book body -->
  <rect x="7" y="5" width="18" height="22" rx="0 2 2 0" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <!-- page lines -->
  <line x1="11" y1="11" x2="22" y2="11" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11" y1="15" x2="22" y2="15" stroke="#475569" stroke-width="1" stroke-linecap="round"/>
  <line x1="11" y1="19" x2="19" y2="19" stroke="#475569" stroke-width="1" stroke-linecap="round"/>
  <!-- small chart line on book -->
  <polyline points="11,24 14,21 17,23 21,18" fill="none" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
